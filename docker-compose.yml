version: '3.8'
services:
  couchdb:
    image: couchdb:3.3
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: password
    ports:
      - "5984:5984"
    volumes:
      - couchdb_data:/opt/couchdb/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      COUCHDB_URL: http://admin:password@couchdb:5984
    depends_on:
      - couchdb

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  couchdb_data:
